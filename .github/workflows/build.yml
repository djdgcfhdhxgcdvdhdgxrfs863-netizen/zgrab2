name: Build and Release Zgrab2 Linux Binary

on:
  workflow_dispatch:  # اجرا با دکمه Run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # رفع هشدار Node.js 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build Linux binary
        run: |
          echo "Building zgrab2-linux"
          GOOS=linux GOARCH=amd64 go build -o zgrab2-linux ./cmd/zgrab2

      - name: Prepare artifact
        run: mkdir -p release && mv zgrab2-linux release/

      - name: Upload artifact for workflow
        uses: actions/upload-artifact@v4
        with:
          name: zgrab2-linux
          path: release/zgrab2-linux

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ github.run_number }}"
          name: "ZGrab2 Linux Release ${{ github.run_number }}"
          body: "Auto-built ZGrab2 Linux binary."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
