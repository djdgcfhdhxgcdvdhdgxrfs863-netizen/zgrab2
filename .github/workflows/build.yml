name: Build Masscan Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            git

      - name: Clone Masscan
        shell: bash
        run: |
          git clone https://github.com/robertdavidgraham/masscan.git
          cd masscan
          make

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "masscan-windows-${{ github.run_number }}"
          name: "Masscan Windows Build ${{ github.run_number }}"
          body: |
            🚀 Masscan Windows Binary
            
            ### Available Binary:
            - **Windows**: `masscan.exe`
            
            Built from: https://github.com/robertdavidgraham/masscan
          files: masscan/bin/masscan.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
