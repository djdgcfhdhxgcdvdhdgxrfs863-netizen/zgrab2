name: Build Zgrab2 Windows EXE with Golang Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build zgrab2.exe using Golang Docker image
        run: |
          docker run --rm \
            -v "$(pwd)":/app \
            -w /app \
            -e GOOS=windows \
            -e GOARCH=amd64 \
            -e CGO_ENABLED=0 \
            golang:1.23-alpine \
            go build -o zgrab2.exe ./cmd/zgrab2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zgrab2-windows-exe
          path: zgrab2.exe
