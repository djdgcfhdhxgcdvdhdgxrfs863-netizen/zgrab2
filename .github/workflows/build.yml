name: Build Zgrab2 Windows Binary

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install cross-compiler for Windows
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Find zcrypto module path
        id: find-path
        run: |
          ZCRYPTO_PATH=$(go env GOPATH)/pkg/mod/github.com/zmap/zcrypto@v0.0.0-20260514033604-a1159eb3cad9
          echo "ZCRYPTO_PATH=${ZCRYPTO_PATH}" >> $GITHUB_ENV
          echo "Found zcrypto at: ${ZCRYPTO_PATH}"
          ls -la "${ZCRYPTO_PATH}/x509/" | head -20

      - name: Patch zcrypto source files
        run: |
          chmod -R u+w "${ZCRYPTO_PATH}"

          # Patch 1: Fix ct/x509/root_windows.go
          CT_WIN="${ZCRYPTO_PATH}/ct/x509/root_windows.go"
          if [ -f "${CT_WIN}" ]; then
            sed -i 's/uintptr(unsafe\.Pointer(sslPara))/(syscall.Pointer)(unsafe.Pointer(sslPara))/g' "${CT_WIN}"
            echo "=== Patched ct/x509/root_windows.go ==="
            grep -n "ExtraPolicyPara" "${CT_WIN}"
          fi

          # Patch 2: Fix x509/root.go to use build tags properly
          ROOT_GO="${ZCRYPTO_PATH}/x509/root.go"
          if [ -f "${ROOT_GO}" ] && grep -q "loadSystemRoots" "${ROOT_GO}"; then
            # Add windows build tag exclusion to the problematic line
            sed -i 's|func loadSystemRoots()|//go:build !windows\nfunc loadSystemRoots()|g' "${ROOT_GO}"
            echo "=== Patched x509/root.go ==="
            grep -n "loadSystemRoots\|go:build" "${ROOT_GO}"
          fi

          # Patch 3: Create x509/root_windows.go if not exists
          X509_WIN="${ZCRYPTO_PATH}/x509/root_windows.go"
          if [ ! -f "${X509_WIN}" ]; then
            cat > "${X509_WIN}" << 'GOEOF'
          package x509

          func loadSystemRoots() (*CertPool, error) {
              return &CertPool{systemPool: true}, nil
          }
          GOEOF
            echo "=== Created x509/root_windows.go ==="
            cat "${X509_WIN}"
          fi

      - name: Verify patches
        run: |
          echo "=== Checking all loadSystemRoots references ==="
          grep -r "loadSystemRoots" "${ZCRYPTO_PATH}/x509/"
          echo "=== File listing ==="
          ls -la "${ZCRYPTO_PATH}/x509/root*.go"

      - name: Cross-compile for Windows with CGO
        run: |
          echo "Building zgrab2.exe for Windows..."
          CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
          go build -v -o zgrab2.exe \
          -ldflags "-extldflags -static" \
          ./cmd/zgrab2
          echo "Build complete!"
          file zgrab2.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zgrab2-windows-amd64
          path: zgrab2.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: zgrab2-windows-amd64
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ github.run_number }}"
          name: "ZGrab2 Windows Release v${{ github.run_number }}"
          body: |
            🚀 Auto-built ZGrab2 Windows binary

            ### Available Binary:
            - **Windows (amd64)**: `zgrab2.exe`

            Built from commit: ${{ github.sha }}
            Patched zcrypto for Windows compatibility
          files: zgrab2.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
