name: Build Windows EXE with Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build zgrab2.exe using official Docker image
        run: |
          docker run --rm \
            -v "$(pwd)":/build \
            -w /build \
            -e GOOS=windows \
            -e GOARCH=amd64 \
            -e CGO_ENABLED=1 \
            ghcr.io/zmap/zgrab2:latest \
            go build -o zgrab2.exe ./cmd/zgrab2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zgrab2-windows-exe
          path: zgrab2.exe
