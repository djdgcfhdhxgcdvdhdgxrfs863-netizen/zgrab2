name: Build and Release Zgrab2 Binaries

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ["1.23"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build binary
        run: |
          echo "Building for ${{ matrix.os }}"
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            GOOS=windows GOARCH=amd64 go build -o zgrab2.exe ./cmd/zgrab2
          else
            GOOS=linux GOARCH=amd64 go build -o zgrab2 ./cmd/zgrab2

      - name: Prepare artifact for release
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv zgrab2.exe release/zgrab2-windows.exe
          else
            mv zgrab2 release/zgrab2-linux

      - name: Upload artifact for workflow
        uses: actions/upload-artifact@v4
        with:
          name: zgrab2-${{ matrix.os }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ github.run_number }}"
          name: "ZGrab2 Release ${{ github.run_number }}"
          body: "Auto-built ZGrab2 binaries for Linux and Windows."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
