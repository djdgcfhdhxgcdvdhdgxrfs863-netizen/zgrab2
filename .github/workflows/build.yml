name: Build Zgrab2 Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix zcrypto and build with Docker
        run: |
          docker run --rm \
            -v "$(pwd)":/app \
            -w /app \
            golang:alpine \
            sh -c '
              echo "Replacing zcrypto with compatible version..."
              go mod edit -replace github.com/zmap/zcrypto=github.com/zmap/zcrypto@v0.0.0-20231219022726-a1f61fb1661c
              go mod tidy
              echo "Building for Windows..."
              GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o zgrab2.exe ./cmd/zgrab2
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zgrab2-windows-exe
          path: zgrab2.exe
