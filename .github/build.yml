name: Build Zgrab2 Binaries

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["1.23"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build binary
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            GOOS=windows GOARCH=amd64 go build -o zgrab2.exe ./cmd/zgrab2
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            GOOS=darwin GOARCH=amd64 go build -o zgrab2 ./cmd/zgrab2
          else
            GOOS=linux GOARCH=amd64 go build -o zgrab2 ./cmd/zgrab2
          fi

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v3
        with:
          name: zgrab2-${{ matrix.os }}
          path: |
            zgrab2
            zgrab2.exe
